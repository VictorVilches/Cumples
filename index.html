<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐄 Cumpleaños</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px 16px;
    }

    h1 { text-align: center; font-size: 1.7rem; margin-bottom: 4px; letter-spacing: 1px; }
    .subtitle { text-align: center; color: #90cdf4; font-size: 0.82rem; margin-bottom: 22px; }

    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 18px;
    }

    .lbl {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #90cdf4;
      margin-bottom: 6px;
    }

    .date-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .date-box .val { font-weight: 700; font-size: 0.95rem; text-transform: capitalize; }

    .next-wrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .cake { font-size: 2.8rem; }
    .bday-name { font-size: 1.5rem; font-weight: 900; color: #fbd38d; }
    .bday-sub  { color: #a0aec0; font-size: 0.85rem; margin-top: 2px; text-transform: capitalize; }

    .days-badge {
      background: linear-gradient(135deg, #f6ad55, #ed8936);
      border-radius: 12px;
      padding: 12px 18px;
      text-align: center;
      min-width: 78px;
      margin-left: auto;
    }
    .days-num { font-size: 2rem; font-weight: 900; line-height: 1; }
    .days-lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: .85; }

    .all-list { margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
    .all-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.84rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .all-row:last-child { border-bottom: none; }
    .all-row .right { color: #90cdf4; }

    select {
      width: 100%; margin-top: 10px; padding: 11px 14px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); color: #fff; font-size: 0.95rem; cursor: pointer;
    }
    select option { background: #1a1a2e; }

    .debt-header { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 14px; }
    .debt-name { font-size: 1.1rem; font-weight: 800; color: #fbd38d; }

    .badge { padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .badge.paid { background: #276749; color: #9ae6b4; }
    .badge.debt { background: #742a2a; color: #feb2b2; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      text-align: left; color: #90cdf4;
      font-size: 0.67rem; text-transform: uppercase; letter-spacing: .8px;
      padding: 6px 6px; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    td { padding: 9px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    tr:last-child td { border-bottom: none; }
    .row-paid td { color: #68d391; }
    .row-pend td { color: #fc8181; }

    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .total-lbl { color: #a0aec0; font-size: 0.85rem; }
    .total-amt { font-size: 1.25rem; font-weight: 900; }
    .total-amt.ok { color: #68d391; }
    .total-amt.ko { color: #fc8181; }

    .empty { text-align: center; color: #718096; padding: 28px 0; font-size: 0.88rem; }
    .footer { text-align: center; color: #4a5568; font-size: 0.72rem; margin-top: 4px; }
    .footer a { color: #90cdf4; text-decoration: none; }

    .error-banner {
      background: rgba(252,129,129,0.15);
      border: 1px solid rgba(252,129,129,0.3);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.78rem;
      color: #feb2b2;
      text-align: center;
      margin-bottom: 18px;
      display: none;
    }
  </style>
</head>
<body>

<h1>🐄 Cumpleaños</h1>
<p class="subtitle">Gestión de cuotas del grupo</p>

<div class="error-banner" id="error-banner"></div>

<div class="card">
  <div class="date-row">
    <div class="date-box">
      <div class="lbl">📅 Hoy</div>
      <div class="val" id="today"></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="lbl">🎉 Próximo cumpleaños</div>
  <div class="next-wrap">
    <div class="cake">🎂</div>
    <div>
      <div class="bday-name" id="next-name"></div>
      <div class="bday-sub"  id="next-date"></div>
    </div>
    <div class="days-badge">
      <div class="days-num" id="next-days"></div>
      <div class="days-lbl" id="next-days-lbl"></div>
    </div>
  </div>
  <div class="all-list">
    <div class="lbl" style="margin-bottom:8px">📋 Siguientes cumpleaños</div>
    <div id="all-list"></div>
  </div>
</div>

<div class="card">
  <div class="lbl">👤 Ver deuda por persona</div>
  <select id="sel" onchange="renderDebt()">
    <option value="">— Selecciona un nombre —</option>
  </select>
  <div id="debt-panel">
    <div class="empty">Selecciona un nombre para ver su deuda</div>
  </div>
</div>

<p class="footer">
  2026 diseño por <a href="https://victorv.pro/" target="_blank">victorv.pro</a>
</p>

<script>
// URL publicada de la hoja "Cuadro de Pago" (Archivo → Publicar en la web → CSV)
const PAGOS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5FU6ZSIhT37leJHmXfJsjki6afwpoz4rq4umZ9qjmk_lsb85n0jaJzdxH0JJZuptVw19tpYpI1TeL/pub?gid=1417447314&single=true&output=csv";
const CUOTA = 5000;

let cumples = [], pagadores = [], secciones = [];
const hoy = new Date();

document.getElementById("today").textContent =
  hoy.toLocaleDateString("es-CL", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

function parseCSVLine(line) {
  const result = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ""; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

// Parsea una sección del CSV a partir de la línea dada.
// Estructura de cada sección:
//   fila 0: Organización YYYY, $5.000, Cumpleaños YYYY, ...
//   fila 1: Pagador, [Deuda], nombre1, nombre2, ...
//   fila 2: ,, DD-MM, DD-MM, ...
//   filas 3+: pagador, [deuda precalc], PAGADO/PENDIENTE, ...
function parseSeccion(lines, start, year) {
  const nameRow = parseCSVLine(lines[start + 1]);
  const dateRow = parseCSVLine(lines[start + 2]);

  const secCumples = [];
  for (let i = 2; i < nameRow.length; i++) {
    const nombre = (nameRow[i] || "").trim();
    const fecha  = (dateRow[i]  || "").trim();
    if (nombre && /^\d{2}-\d{2}$/.test(fecha)) {
      const [d, m] = fecha.split("-").map(Number);
      secCumples.push({ nombre, d, m, year, fc: `${String(d).padStart(2,"0")}/${String(m).padStart(2,"0")}/${year}` });
    }
  }

  const secPagadores = [];
  for (let i = start + 3; i < lines.length; i++) {
    const cols  = parseCSVLine(lines[i]);
    const nombre = (cols[0] || "").trim();
    if (!nombre) break;
    const pagos = {};
    secCumples.forEach((c, j) => {
      pagos[c.nombre] = (cols[j + 2] || "").trim().toUpperCase();
    });
    secPagadores.push({ nombre, pagos });
  }

  return { year, cumples: secCumples, pagadores: secPagadores };
}

function parsePagos(text) {
  const lines = text.split("\n").map(l => l.trim());
  const currentYear = hoy.getFullYear();
  const years = [currentYear - 1, currentYear]; // 2025 y 2026

  secciones = [];
  for (let i = 0; i < lines.length; i++) {
    const col0 = (parseCSVLine(lines[i])[0] || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    const yearMatch = lines[i].match(/\b(20\d{2})\b/);
    if (!col0.startsWith("organizacion") || !yearMatch) continue;
    const year = parseInt(yearMatch[1]);
    if (!years.includes(year)) continue;
    secciones.push(parseSeccion(lines, i, year));
  }

  // cumples y pagadores del año actual (para próximo cumpleaños y selector)
  const secActual = secciones.find(s => s.year === currentYear);
  cumples   = secActual ? secActual.cumples   : [];
  pagadores = secActual ? secActual.pagadores : [];
}

function nextBday(fc) {
  const [d, m] = fc.split("/").map(Number);
  let bd = new Date(hoy.getFullYear(), m - 1, d);
  if (bd <= hoy) bd = new Date(hoy.getFullYear() + 1, m - 1, d);
  const days = Math.ceil((bd - hoy) / 86400000);
  return { date: bd, days };
}

function renderNext() {
  const sorted = cumples
    .map(c => ({ ...c, ...nextBday(c.fc) }))
    .sort((a, b) => a.days - b.days);

  const next = sorted[0];
  document.getElementById("next-name").textContent = next.nombre;
  document.getElementById("next-date").textContent =
    next.date.toLocaleDateString("es-CL", { day:"numeric", month:"long" });
  document.getElementById("next-days").textContent = next.days;
  document.getElementById("next-days-lbl").textContent = next.days === 1 ? "día" : "días";

  const allEl = document.getElementById("all-list");
  allEl.innerHTML = "";
  sorted.slice(1).forEach((c, i) => {
    const row = document.createElement("div");
    row.className = "all-row";
    row.innerHTML = `
      <span>${i === 0 ? "⭐ " : ""}${c.nombre}</span>
      <span class="right">${c.date.toLocaleDateString("es-CL",{day:"numeric",month:"short"})} · ${c.days}d</span>`;
    allEl.appendChild(row);
  });
}

function populateSelect() {
  const sel = document.getElementById("sel");
  while (sel.options.length > 1) sel.remove(1);
  pagadores.forEach(p => {
    const o = document.createElement("option");
    o.value = p.nombre;
    o.textContent = p.nombre;
    sel.appendChild(o);
  });
}

// Suma deuda de todos los años parseados.
// Año anterior: todos los eventos cuentan (año cerrado).
// Año actual: solo eventos con fecha ≤ hoy.
function calcDebt(nombre) {
  const filas = [];
  let totalDeuda = 0;
  const currentYear = hoy.getFullYear();

  for (const sec of secciones) {
    const payer = sec.pagadores.find(p => p.nombre === nombre);
    if (!payer) continue;

    for (const c of sec.cumples) {
      if (sec.year === currentYear) {
        const fechaCumple = new Date(currentYear, c.m - 1, c.d);
        if (fechaCumple > hoy) continue;
      }

      const estado = payer.pagos[c.nombre] || "";
      if (!estado) continue; // celda vacía = no aplica

      const pagado = estado === "PAGADO";
      if (!pagado) {
        totalDeuda += CUOTA;
        filas.push({ nombre: c.nombre, fc: c.fc, año: sec.year });
      }
    }
  }

  return { filas, totalDeuda };
}

function renderDebt() {
  const nombre = document.getElementById("sel").value;
  const panel  = document.getElementById("debt-panel");

  if (!nombre) {
    panel.innerHTML = '<div class="empty">Selecciona un nombre para ver su deuda</div>';
    return;
  }

  const { filas, totalDeuda } = calcDebt(nombre);

  if (!filas.length) {
    panel.innerHTML = `
      <div class="debt-header">
        <span class="debt-name">${nombre}</span>
        <span class="badge paid">Al día ✓</span>
      </div>
      <div class="empty">¡Sin deuda! 🎉</div>`;
    return;
  }

  const rows = filas.map(f => `
    <tr class="row-pend">
      <td>${f.nombre}</td>
      <td>${f.fc}</td>
      <td>${f.año}</td>
      <td>❌ Pendiente</td>
    </tr>`).join("");

  panel.innerHTML = `
    <div class="debt-header">
      <span class="debt-name">${nombre}</span>
      <span class="badge debt">Con deuda</span>
    </div>
    <table>
      <thead>
        <tr><th>Cumpleañero</th><th>Fecha</th><th>Año</th><th></th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="total-row">
      <span class="total-lbl">Total pendiente</span>
      <span class="total-amt ko">$${totalDeuda.toLocaleString("es-CL")}</span>
    </div>`;
}

async function loadData() {
  async function tryFetch(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.text();
  }

  async function fetchCSV() {
    // 1° intento: directo
    try { return await tryFetch(PAGOS_CSV_URL); } catch(e) {}
    // 2° intento: allorigins
    try { return await tryFetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(PAGOS_CSV_URL)); } catch(e) {}
    // 3° intento: corsproxy
    return await tryFetch("https://corsproxy.io/?" + encodeURIComponent(PAGOS_CSV_URL));
  }

  const banner = document.getElementById("error-banner");

  try {
    const text = await fetchCSV();
    parsePagos(text);

    if (cumples.length === 0) {
      throw new Error(`Sección del año ${hoy.getFullYear()} no encontrada en el CSV.`);
    }

    renderNext();
    populateSelect();
  } catch (err) {
    banner.textContent = "⚠️ " + err.message;
    banner.style.display = "block";
    console.error("Error cargando sheet:", err);
  }
}

loadData();
</script>
</body>
</html>
