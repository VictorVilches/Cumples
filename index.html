<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐄 Cumpleaños</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px 16px;
    }

    h1 { text-align: center; font-size: 1.7rem; margin-bottom: 4px; letter-spacing: 1px; }
    .subtitle { text-align: center; color: #90cdf4; font-size: 0.82rem; margin-bottom: 22px; }

    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 18px;
    }

    .lbl {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #90cdf4;
      margin-bottom: 6px;
    }

    /* ── Fecha ── */
    .date-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .date-box .val { font-weight: 700; font-size: 0.95rem; text-transform: capitalize; }

    /* ── Próximo cumple ── */
    .next-wrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .cake { font-size: 2.8rem; }
    .bday-name { font-size: 1.5rem; font-weight: 900; color: #fbd38d; }
    .bday-sub  { color: #a0aec0; font-size: 0.85rem; margin-top: 2px; text-transform: capitalize; }

    .days-badge {
      background: linear-gradient(135deg, #f6ad55, #ed8936);
      border-radius: 12px;
      padding: 12px 18px;
      text-align: center;
      min-width: 78px;
      margin-left: auto;
    }
    .days-num { font-size: 2rem; font-weight: 900; line-height: 1; }
    .days-lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: .85; }

    /* ── Lista todos ── */
    .all-list { margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
    .all-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.84rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .all-row:last-child { border-bottom: none; }
    .all-row.first span:first-child { color: #fbd38d; }
    .all-row .right { color: #90cdf4; }

    /* ── Selector ── */
    select {
      width: 100%; margin-top: 10px; padding: 11px 14px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); color: #fff; font-size: 0.95rem; cursor: pointer;
    }
    select option { background: #1a1a2e; }

    /* ── Panel deuda ── */
    .debt-header { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 14px; }
    .debt-name { font-size: 1.1rem; font-weight: 800; color: #fbd38d; }

    .badge { padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .badge.paid { background: #276749; color: #9ae6b4; }
    .badge.debt { background: #742a2a; color: #feb2b2; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      text-align: left; color: #90cdf4;
      font-size: 0.67rem; text-transform: uppercase; letter-spacing: .8px;
      padding: 6px 6px; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    td { padding: 9px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    tr:last-child td { border-bottom: none; }
    .row-paid td { color: #68d391; }
    .row-pend td { color: #fc8181; }

    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .total-lbl { color: #a0aec0; font-size: 0.85rem; }
    .total-amt { font-size: 1.25rem; font-weight: 900; }
    .total-amt.ok { color: #68d391; }
    .total-amt.ko { color: #fc8181; }

    .empty { text-align: center; color: #718096; padding: 28px 0; font-size: 0.88rem; }
    .footer { text-align: center; color: #4a5568; font-size: 0.72rem; margin-top: 4px; }
    .footer a { color: #90cdf4; text-decoration: none; }

    .demo-banner {
      background: rgba(246,173,85,0.15);
      border: 1px solid rgba(246,173,85,0.3);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.78rem;
      color: #fbd38d;
      text-align: center;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>

<h1>🎂 🐄 Cumpleaños</h1>
<p class="subtitle">Gestión de cuotas del grupo</p>

<div class="demo-banner" id="demo-banner">
  ⚡ Modo demo — Reemplaza <code>SHEET_CSV_URL</code> con tu Google Sheets para datos reales
</div>

<!-- Fecha actual -->
<div class="card">
  <div class="date-row">
    <div class="date-box">
      <div class="lbl">📅 Hoy</div>
      <div class="val" id="today"></div>
    </div>
  </div>
</div>

<!-- Próximo cumpleaños -->
<div class="card">
  <div class="lbl">🎉 Próximo cumpleaños</div>
  <div class="next-wrap">
    <div class="cake">🎂</div>
    <div>
      <div class="bday-name" id="next-name"></div>
      <div class="bday-sub"  id="next-date"></div>
    </div>
    <div class="days-badge">
      <div class="days-num" id="next-days"></div>
      <div class="days-lbl" id="next-days-lbl"></div>
    </div>
  </div>
  <div class="all-list">
    <div class="lbl" style="margin-bottom:8px">📋 Siguientes cumpleaños</div>
    <div id="all-list"></div>
  </div>
</div>

<!-- Selector de persona -->
<div class="card">
  <div class="lbl">👤 Ver deuda por persona</div>
  <select id="sel" onchange="renderDebt()">
    <option value="">— Selecciona un nombre —</option>
  </select>
  <div id="debt-panel">
    <div class="empty">Selecciona un nombre para ver su deuda</div>
  </div>
</div>

<p class="footer">
  Datos desde <a href="#" id="sheet-link" target="_blank">Google Sheets</a> ·
  Se actualiza en cada visita
</p>

<script>
// ================================================================
//  ⚙️  CONFIGURACIÓN
//  1. Publica tu Google Sheet: Archivo → Publicar en la web → CSV
//  2. Pega la URL aquí:
// ================================================================
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5FU6ZSIhT37leJHmXfJsjki6afwpoz4rq4umZ9qjmk_lsb85n0jaJzdxH0JJZuptVw19tpYpI1TeL/pub?gid=0&single=true&output=csv";
// Ejemplo:
// const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/ABCDEF123/pub?output=csv";

// ================================================================
//  Estructura esperada del CSV (primera fila = encabezados):
//
//  apodo | fc | ene | feb | mar | abr | may | jun | jul | ago | sep | oct | nov | dic
//
//  - apodo   : nombre o apodo del participante
//  - fc      : fecha de cumpleaños en formato DD/MM  (ej: 15/03)
//  - ene~dic : estado del mes → "pagado" | "pendiente" | (vacío)
//              vacío significa que ese mes no hubo cumpleaños (no se cobra)
// ================================================================

const CUOTA = 5000; // CLP por cada cumpleaños del mes

const MESES   = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const MESES_N = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio",
                 "Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

let participantes = [];
const hoy = new Date();

// ── Fecha actual ──────────────────────────────────────────────
document.getElementById("today").textContent =
  hoy.toLocaleDateString("es-CL", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

// ── Parsear una línea CSV respetando comillas ─────────────────
function parseCSVLine(line) {
  const result = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ""; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

// ── Parsear CSV ───────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, ""));  // sin tildes
  return lines.slice(1)
    .map(line => {
      const cols = parseCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (cols[i] || "").trim());
      // Mapear columnas del CSV a las esperadas por el código
      obj.apodo = obj.nombre || obj.apodo || "";
      obj.fc    = obj.cumpleanos || obj.fc || "";  // "cumpleaños" sin tilde
      return obj;
    })
    .filter(r => r.apodo && /^\d{1,2}\/\d{1,2}$/.test(r.fc));
}

// ── Calcular próximo cumpleaños ───────────────────────────────
function nextBday(fc) {
  const [d, m] = fc.split("/").map(Number);
  let bd = new Date(hoy.getFullYear(), m - 1, d);
  if (bd <= hoy) bd = new Date(hoy.getFullYear() + 1, m - 1, d);
  const days = Math.ceil((bd - hoy) / 86400000);
  return { date: bd, days };
}

// ── Render próximo cumpleaños ─────────────────────────────────
function renderNext() {
  const sorted = participantes
    .map(p => ({ ...p, ...nextBday(p.fc) }))
    .sort((a, b) => a.days - b.days);

  const next = sorted[0];
  document.getElementById("next-name").textContent = next.apodo;
  document.getElementById("next-date").textContent =
    next.date.toLocaleDateString("es-CL", { day:"numeric", month:"long" });
  document.getElementById("next-days").textContent = next.days;
  document.getElementById("next-days-lbl").textContent = next.days === 1 ? "día" : "días";

  const allEl = document.getElementById("all-list");
  allEl.innerHTML = "";
  sorted.slice(1).forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "all-row";
    row.innerHTML = `
      <span>${i === 0 ? "⭐ " : ""}${p.apodo}</span>
      <span class="right">${p.date.toLocaleDateString("es-CL",{day:"numeric",month:"short"})} · ${p.days}d</span>`;
    allEl.appendChild(row);
  });
}

// ── Poblar selector ───────────────────────────────────────────
function populateSelect() {
  const sel = document.getElementById("sel");
  // limpiar opciones previas (excepto la primera)
  while (sel.options.length > 1) sel.remove(1);
  participantes.forEach(p => {
    const o = document.createElement("option");
    o.value = p.apodo;
    o.textContent = p.apodo;
    sel.appendChild(o);
  });
}

// ── Calcular deuda de una persona ────────────────────────────
function calcDebt(persona) {
  const mesActual = hoy.getMonth();

  // cuántos cumpleaños por mes en el grupo
  const cumplesPorMes = {};
  MESES.forEach((m, i) => {
    cumplesPorMes[m] = participantes.filter(
      p => parseInt(p.fc.split("/")[1]) - 1 === i
    ).length;
  });

  let totalDeuda = 0;
  const filas = [];

  MESES.forEach((m, i) => {
    if (i > mesActual) return;           // mes futuro, no aplica
    if (cumplesPorMes[m] === 0) return;  // sin cumpleaños ese mes, no se cobra

    const cuota  = cumplesPorMes[m] * CUOTA;
    const estado = (persona[m] || "").toLowerCase().trim();
    const pagado = ["pagado", "pago", "si", "sí", "ok", "✓"].includes(estado);

    if (!pagado) totalDeuda += cuota;
    filas.push({ mes: MESES_N[i], cuota, pagado, n: cumplesPorMes[m] });
  });

  return { filas, totalDeuda };
}

// ── Render panel deuda ────────────────────────────────────────
function renderDebt() {
  const apodo  = document.getElementById("sel").value;
  const panel  = document.getElementById("debt-panel");

  if (!apodo) {
    panel.innerHTML = '<div class="empty">Selecciona un nombre para ver su deuda</div>';
    return;
  }

  const persona = participantes.find(p => p.apodo === apodo);
  if (!persona) return;

  const { filas, totalDeuda } = calcDebt(persona);

  if (!filas.length) {
    panel.innerHTML = '<div class="empty">No hay meses con cumpleaños registrados aún este año.</div>';
    return;
  }

  const rows = filas.map(f => `
    <tr class="${f.pagado ? 'row-paid' : 'row-pend'}">
      <td>${f.mes}</td>
      <td>${f.n} 🎂</td>
      <td>$${f.cuota.toLocaleString("es-CL")}</td>
      <td>${f.pagado ? "✅ Pagado" : "❌ Pendiente"}</td>
    </tr>`).join("");

  panel.innerHTML = `
    <div class="debt-header">
      <span class="debt-name">${apodo}</span>
      <span class="badge ${totalDeuda === 0 ? 'paid' : 'debt'}">
        ${totalDeuda === 0 ? "Al día ✓" : "Con deuda"}
      </span>
    </div>
    <table>
      <thead>
        <tr><th>Mes</th><th>Evento</th><th>Cuota</th><th>Estado</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="total-row">
      <span class="total-lbl">Total pendiente</span>
      <span class="total-amt ${totalDeuda === 0 ? 'ok' : 'ko'}">
        ${totalDeuda === 0 ? "¡Pagado! 🎉" : "$" + totalDeuda.toLocaleString("es-CL")}
      </span>
    </div>`;
}

// ── Cargar datos ──────────────────────────────────────────────
async function loadData() {

  // DATOS DEMO (se usan mientras SHEET_CSV_URL = "TU_URL_AQUI")
  const DEMO = [
    { apodo:"Cote",  fc:"15/01", ene:"pagado",   feb:"pagado",   mar:"pagado",    abr:"",may:"",jun:"",jul:"",ago:"",sep:"",oct:"",nov:"",dic:"" },
    { apodo:"Benja", fc:"03/03", ene:"pagado",   feb:"pagado",   mar:"pendiente", abr:"",may:"",jun:"",jul:"",ago:"",sep:"",oct:"",nov:"",dic:"" },
    { apodo:"Rochi", fc:"22/07", ene:"pagado",   feb:"pagado",   mar:"pendiente", abr:"",may:"",jun:"",jul:"",ago:"",sep:"",oct:"",nov:"",dic:"" },
    { apodo:"Seba",  fc:"08/11", ene:"pagado",   feb:"",         mar:"pendiente", abr:"",may:"",jun:"",jul:"",ago:"",sep:"",oct:"",nov:"",dic:"" },
    { apodo:"Kari",  fc:"03/03", ene:"pagado",   feb:"pagado",   mar:"pagado",    abr:"",may:"",jun:"",jul:"",ago:"",sep:"",oct:"",nov:"",dic:"" },
  ];

  if (SHEET_CSV_URL === "TU_URL_AQUI") {
    // Modo demo
    participantes = DEMO;
    renderNext();
    populateSelect();
    return;
  }

  // Modo real: cargar desde Google Sheets
  document.getElementById("demo-banner").style.display = "none";
  document.getElementById("sheet-link").href = SHEET_CSV_URL;

  async function fetchCSV() {
    // 1° intento: directo
    try {
      const res = await fetch(SHEET_CSV_URL);
      if (res.ok) return await res.text();
    } catch(e) {}
    // 2° intento: proxy CORS
    const proxy = "https://corsproxy.io/?" + encodeURIComponent(SHEET_CSV_URL);
    const res = await fetch(proxy);
    if (!res.ok) throw new Error("Proxy también falló");
    return await res.text();
  }

  try {
    const text = await fetchCSV();
    participantes = parseCSV(text);
    renderNext();
    populateSelect();
  } catch (err) {
    document.getElementById("demo-banner").textContent =
      "⚠️ Error al cargar Google Sheets. Revisa la URL y que la hoja esté publicada.";
    document.getElementById("demo-banner").style.display = "block";
    console.error("Error cargando sheet:", err);
  }
}

loadData();
</script>
</body>
</html>
